name: Dice Bot Deploy

on:
  push:
    branches: [main]
    paths:
      - 'dice-bot/**'
    path-ignore:
      - 'dice-bot/README.md' 
      - 'dice-bot/DEPLOYMENT.md'
  workflow_dispatch:

defaults:
  run:
    working-directory: dice-bot

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dice-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test  # テストがpassしてからデプロイ
    environment: production

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dice-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Discord Bot Token secret
        run: echo "${{ secrets.DISCORD_BOT_TOKEN }}" | npx wrangler secret put DISCORD_BOT_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}