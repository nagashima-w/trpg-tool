name: Scenario Converter Test

on:
  push:
    branches: [main]
    paths:
      - 'scenario-converter/src/**'
      - 'scenario-converter/package*.json'
      - 'scenario-converter/tsconfig*.json'
      - 'scenario-converter/vitest.config.*'
  pull_request:
    branches: [main]
    paths:
      - 'scenario-converter/src/**'
      - 'scenario-converter/package*.json'
      - 'scenario-converter/tsconfig*.json'
      - 'scenario-converter/vitest.config.*'

defaults:
  run:
    working-directory: scenario-converter

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scenario-converter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
