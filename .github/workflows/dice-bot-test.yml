name: Dice Bot Test

on:
  push:
    branches: [main]
    paths:
      - 'dice-bot/**'
    path-ignore:
      - 'dice-bot/README.md'
  pull_request:
    branches: [main]
    paths:
      - 'dice-bot/**'
    path-ignore:
      - 'dice-bot/README.md'

defaults:
  run:
    working-directory: dice-bot

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dice-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test