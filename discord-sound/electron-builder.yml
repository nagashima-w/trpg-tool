appId: com.trpg-tool.discord-sound-player
productName: Discord Sound Player
files:
  - out/**/*
  - node_modules/**/*
  - package.json
asarUnpack:
  - node_modules/ffmpeg-static/**
directories:
  buildResources: build
  output: dist
nsis:
  include: build/installer.nsh
win:
  target: nsis
mac:
  target: dmg
  identity: null
linux:
  target: AppImage
