<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoC 6→7版 シナリオコンバーター</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header class="header">
      <h1>CoC 6→7版 シナリオコンバーター</h1>
      <button id="open-btn" class="btn btn-primary">ファイルを開く</button>
      <button id="settings-btn" class="btn btn-secondary">設定</button>
    </header>

    <!-- ドロップゾーン -->
    <div id="drop-zone" class="drop-zone">
      <p>テキスト / PDF をここにドロップ</p>
      <small>または「ファイルを開く」ボタンから選択</small>
    </div>

    <!-- ステータスバー（読込後に表示） -->
    <div id="statusbar" class="statusbar hidden">
      <span id="status-file"></span>
      <span>変換ブロック: <span id="status-blocks" class="count">0</span> 件</span>
      <span>技能リネーム: <span id="status-renames" class="count">0</span> 件</span>
      <span>用語変換: <span id="status-narrative" class="count">0</span> 件</span>
      <button id="ai-reextract-btn" class="btn btn-ai hidden">AI再抽出</button>
      <button id="ai-reformat-btn" class="btn btn-ai hidden">AI整形</button>
      <button id="ai-balance-btn" class="btn btn-ai hidden">AI戦闘バランス分析</button>
    </div>

    <!-- 警告バナー -->
    <div id="warning-banner" class="warning-banner hidden">
      <span id="warning-text"></span>
      <button id="warning-close" class="warning-close">✕</button>
    </div>

    <!-- 差分ビュー（読込後に表示） -->
    <div id="diff-area" class="diff-area hidden">
      <div class="diff-pane">
        <div class="pane-header">元の文書（6版）</div>
        <div id="pane-original" class="pane-content"></div>
      </div>
      <div class="diff-pane">
        <div class="pane-header">変換後（7版）― クリックで編集</div>
        <div id="pane-converted" class="pane-content"></div>
      </div>
    </div>

    <!-- フッター -->
    <footer id="footer" class="footer hidden">
      <button id="save-btn" class="btn btn-success">txt で保存</button>
    </footer>
  </div>

  <!-- 設定モーダル（将来のAI連携用） -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>設定</h3>
      <div class="form-group">
        <label>AI連携</label>
        <select id="ai-provider-select">
          <option value="none">使用しない</option>
          <option value="claude">Claude API</option>
          <option value="gemini">Gemini API</option>
        </select>
      </div>
      <div class="form-group">
        <label>Claude API キー</label>
        <input type="password" id="claude-apikey-input" placeholder="Claude APIキーを入力" />
      </div>
      <div class="form-group">
        <label>Gemini API キー</label>
        <input type="password" id="gemini-apikey-input" placeholder="Gemini APIキーを入力" />
      </div>
      <div class="form-group">
        <label class="toggle-label">
          <input type="checkbox" id="ai-pdf-extract-input" />
          PDFの内容をAIで抽出する
        </label>
        <small class="form-hint">Claude / Gemini のAPIキー設定時に有効。PDF読み込みにAPIが使われます。</small>
      </div>
      <div class="modal-footer">
        <button id="settings-save-btn" class="btn btn-primary">保存</button>
        <button id="settings-cancel-btn" class="btn btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- バランス分析モーダル -->
  <div id="balance-modal" class="modal-overlay hidden">
    <div class="modal balance-modal">
      <h3>AI戦闘バランス分析結果</h3>
      <div id="balance-suggestion-list" class="balance-list"></div>
      <div class="modal-footer">
        <button id="balance-apply-all-btn" class="btn btn-success">選択した提案を適用</button>
        <button id="balance-close-btn" class="btn btn-secondary">閉じる</button>
      </div>
    </div>
  </div>

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p id="loading-msg">処理中...</p>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
